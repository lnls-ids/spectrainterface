name: Trigger SIRIUS Data Update
on:
  push:
    branches:
      - master
    paths:
      - 'spectrainterface/sirius.py' # if sirius is updated

jobs:
  ping-repo-b:
    runs-on: ubuntu-latest
    steps:
      - name: Update Version in sirius-beamlines-data
        env:
          TOKEN: ${{ secrets.PAT_TOKEN }} 
        run: |
          # Repo git clone
          git clone https://x-access-token:$TOKEN@://github.com sirius-beamlines-data
          cd sirius-beamlines-data
          
          # Update the trigger file
          echo "Last update from spectrainterface/sirius.py at $(date)" > trigger_version.txt
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trigger_version.txt
          git commit -m "Trigger: spectrainterface/sirius.py updated"
          git push
